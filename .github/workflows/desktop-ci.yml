name: Desktop CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate web and backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix server

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Test backend
        run: npm --prefix server test

      - name: Test frontend
        run: npm --prefix frontend test

      - name: Test desktop config
        run: npm run test:desktop-config

      - name: Build backend and frontend
        run: npm run build

  macos-desktop:
    name: Build macOS desktop bundle
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix server

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build Tauri app and DMG
        run: npm run desktop:build:mac

      - name: Upload macOS bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: inkflow-macos-${{ github.sha }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/macos/InkFlow.app
            src-tauri/target/release/bundle/dmg/*.dmg
