<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InkFlow Creation Notch Preview</title>
    <style>
      :root {
        color-scheme: light dark;
        --paper: oklch(97% 0.012 230);
        --ink: oklch(24% 0.025 250);
        --line: oklch(83% 0.025 245 / 0.74);
        --accent: oklch(62% 0.16 255);
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: start center;
        padding: 48px 24px;
        background: var(--paper);
        color: var(--ink);
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      }

      .notch-shell {
        width: min(760px, 92vw);
        border: 1px solid var(--line);
        border-radius: 0 0 18px 18px;
        background: oklch(99% 0.006 230 / 0.72);
        box-shadow: 0 18px 48px oklch(20% 0.04 250 / 0.14);
        backdrop-filter: blur(28px) saturate(1.2);
        overflow: hidden;
      }

      .pull-handle {
        width: 76px;
        height: 5px;
        display: block;
        margin: 10px auto 12px;
        border-radius: 999px;
        background: color-mix(in oklch, var(--accent) 45%, var(--line));
      }

      .notch-timeline {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 12px;
        margin: 0;
        padding: 0 18px 18px;
        list-style: none;
      }

      .notch-timeline li {
        min-height: 58px;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 10px;
        background: oklch(100% 0 0 / 0.45);
      }
    </style>
  </head>
  <body>
    <section class="notch-shell" aria-label="Creation Notch">
      <span class="pull-handle"></span>
      <ol class="notch-timeline">
        <li>文风</li>
        <li>设定库</li>
        <li>大纲</li>
        <li>剧情图</li>
        <li>正文</li>
        <li>审稿</li>
      </ol>
    </section>
  </body>
</html>
