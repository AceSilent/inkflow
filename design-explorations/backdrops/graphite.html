<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>石墨·炭光</title>
<style>
  /* 色板严格取自 graphite 主题 token(design-tokens.css [data-theme="graphite"],oklch 换算 sRGB):
     --bg            oklch(23% .01 255)   -> #1a1d22   (画布基色,冷调深灰)
     --bg-subtle     oklch(26% .012 255)  -> #20242a
     --bg-elevated   oklch(30% .012 255)  -> #2a2e34   (glass 面板取色基)
     --surface-glass oklch(31% .012 255)  -> #2c3136
     --ink           oklch(94% .008 250)  -> #e7ecf0   (微粒/掠光的无彩白)
     --ink-secondary oklch(78% .01 250)   -> #b3b8be
     --ink-muted     oklch(64% .01 250)   -> #888d92
     --border-subtle oklch(38% .012 255)  -> #3e4349
     --ambient-c     oklch(17% .008 255)  -> #0d1013   (四角炭影)
     glass 体系:--glass-panel-strong = bg-elevated 18% / --glass-border ≈ 白 7% /
     --glass-highlight = 白 6.5%(index.css graphite 分支)。
     刻意比 ink 主题更禁欲:无星空、无任何彩色,只有中性灰的材质与光。

     —— 强度三档(右下角分段控件 / 键 1·2·3,默认「浓郁」)——
     含蓄 subtle :首版原参数,几乎只可意会。
     适中 medium :约 2.5x —— 密度、对比、速度、事件频率同步上调。
     浓郁 rich   :约 5x+ —— 碳尘分近中远三层(近层带景深晕)、拉丝常驻可见、
                   掠光 15s 一道峰值 ~13%、叠加大尺度明暗涌动;仍是无彩灰阶,
                   是「材质感拉满」,不是加彩色。 */
  :root {
    --bg: #1a1d22;
    --bg-elevated: #2a2e34;
    --ink: #e7ecf0;
    --ink-secondary: #b3b8be;
    --ink-muted: #888d92;
    --border-subtle: #3e4349;
    --charcoal: #0d1013;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    overflow: hidden;
    /* canvas 加载前 / 渲染失败时仍是真实 token 底色 */
    background: var(--bg);
    color: var(--ink);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
      "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  #backdrop {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
    z-index: 0;
  }

  /* —— 毛玻璃样文面板:居中偏右,检验长文字可读性 —— */
  .panel {
    position: fixed;
    top: 50%;
    right: clamp(16px, 8vw, 140px);
    transform: translateY(-50%);
    width: min(440px, 86vw);
    z-index: 2;
    padding: 22px 24px 18px;
    border-radius: 16px;
    background: rgba(42, 46, 52, 0.18);            /* glass-panel-strong: bg-elevated 18% */
    border: 1px solid rgba(231, 236, 240, 0.085);  /* glass-border */
    box-shadow:
      0 30px 96px rgba(0, 0, 0, 0.22),
      0 10px 30px rgba(0, 0, 0, 0.12),
      inset 0 1px 0 rgba(255, 255, 255, 0.065),    /* glass-highlight */
      inset 0 0 0 1px rgba(255, 255, 255, 0.035);
    -webkit-backdrop-filter: blur(28px) saturate(1.04);
    backdrop-filter: blur(28px) saturate(1.04);
    transition: background-color 220ms ease;
  }

  /* 强档时背景能量更高,面板底色随档位轻微增稠,保证文字可读性不被穿透 */
  body[data-intensity="medium"] .panel { background: rgba(42, 46, 52, 0.27); }
  body[data-intensity="rich"]   .panel { background: rgba(42, 46, 52, 0.36); }

  .panel header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .panel header .chapter {
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--ink-secondary);
  }

  .panel header .meta {
    font-size: 11px;
    color: var(--ink-muted);
    font-variant-numeric: tabular-nums;
  }

  .panel p {
    font-size: 14px;
    line-height: 1.6;
    color: #d4d9de; /* ink 与 ink-secondary 之间,正文阅读灰 */
    margin-bottom: 10px;
    text-align: justify;
  }

  .panel p:last-of-type { margin-bottom: 16px; }

  .composer {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(42, 46, 52, 0.54);            /* chat-composer-surface: bg-elevated 54% */
    border: 1px solid rgba(231, 236, 240, 0.06);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
  }

  .composer .caret {
    width: 1.5px;
    height: 16px;
    flex: none;
    background: var(--ink-secondary);
    opacity: 0.9;
  }

  @media (prefers-reduced-motion: no-preference) {
    .composer .caret { animation: caretBlink 1.15s steps(2, jump-none) infinite; }
    @keyframes caretBlink { 0% { opacity: 0.9; } 100% { opacity: 0; } }
  }

  .composer .placeholder {
    flex: 1;
    font-size: 13px;
    color: var(--ink-muted);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  .composer .send {
    flex: none;
    font-size: 12px;
    color: var(--ink-secondary);
    padding: 3px 11px;
    border-radius: 6px;
    border: 1px solid rgba(231, 236, 240, 0.12);
    background: rgba(231, 236, 240, 0.05);
  }

  /* —— 左下角概念标签 —— */
  .tag {
    position: fixed;
    left: 22px;
    bottom: 20px;
    z-index: 2;
    max-width: min(420px, 70vw);
    padding: 9px 13px;
    border-radius: 9px;
    background: rgba(26, 29, 34, 0.45);
    border: 1px solid rgba(231, 236, 240, 0.07);
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
  }

  body[data-intensity="rich"] .tag { background: rgba(26, 29, 34, 0.58); }

  .tag strong {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: #d4d9de;
    margin-bottom: 2px;
  }

  .tag span {
    display: block;
    font-size: 11.5px;
    line-height: 1.5;
    color: var(--ink-muted);
  }

  /* —— 右下角强度分段控件 —— */
  .intensity {
    position: fixed;
    right: 22px;
    bottom: 20px;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 3px;
    border-radius: 9px;
    background: rgba(26, 29, 34, 0.45);
    border: 1px solid rgba(231, 236, 240, 0.07);
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
  }

  body[data-intensity="rich"] .intensity { background: rgba(26, 29, 34, 0.58); }

  .intensity .intensity-label {
    font-size: 10.5px;
    letter-spacing: 0.08em;
    color: var(--ink-muted);
    padding: 0 7px 0 9px;
    user-select: none;
  }

  .intensity .lvl {
    appearance: none;
    font: inherit;
    font-size: 11.5px;
    letter-spacing: 0.05em;
    color: var(--ink-muted);
    padding: 4px 11px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: transparent;
    cursor: pointer;
    transition: background-color 200ms ease, color 200ms ease, border-color 200ms ease;
  }

  .intensity .lvl:hover { color: var(--ink-secondary); }

  .intensity .lvl[aria-pressed="true"] {
    background: rgba(231, 236, 240, 0.085);
    border-color: rgba(231, 236, 240, 0.11);
    color: #d4d9de;
  }

  .intensity .lvl:focus-visible {
    outline: 1px solid rgba(231, 236, 240, 0.35);
    outline-offset: 1px;
  }
</style>
</head>
<body data-intensity="rich">
<canvas id="backdrop" aria-hidden="true"></canvas>

<main class="panel">
  <header>
    <span class="chapter">第十四章 · 灯下</span>
    <span class="meta">1,842 字 · 草稿</span>
  </header>
  <p>灯芯压得很低,纸上的字迹便也跟着暗下来,像退潮之后留在沙上的一行脚印,潮水不再来,脚印却赖着不走。</p>
  <p>沈青梧搁下笔。巷口传来更鼓,三更了,砚里的墨还未干,她伸手拢了拢灯罩,火光在指缝间安静地晃了一下。</p>
  <p>她忽然明白这一章迟迟收不了尾,不是因为故事,而是因为故事里的人不肯走——他们还坐在灯下,等她想清楚。</p>
  <div class="composer">
    <span class="caret"></span>
    <span class="placeholder">让灯再亮一些,把这一段写完……</span>
    <span class="send">发送</span>
  </div>
</main>

<aside class="tag">
  <strong>石墨·炭光</strong>
  <span>碳尘微浮,斜光掠过拉丝石墨,四角炭影缓慢呼吸;无彩冷灰,宜深夜长写。强度可调:右下角三档,或按 1 / 2 / 3。</span>
</aside>

<aside class="intensity" id="intensityCtl" role="group" aria-label="背景强度">
  <span class="intensity-label">强度</span>
  <button type="button" class="lvl" data-level="subtle" title="快捷键 1" aria-pressed="false">含蓄</button>
  <button type="button" class="lvl" data-level="medium" title="快捷键 2" aria-pressed="false">适中</button>
  <button type="button" class="lvl" data-level="rich" title="快捷键 3" aria-pressed="true">浓郁</button>
</aside>

<script>
(function () {
  'use strict';

  var canvas = document.getElementById('backdrop');
  var ctx = canvas.getContext('2d', { alpha: false });
  if (!ctx) return; // 退化为 CSS 纯色底

  var DPR_CAP = 2;
  var TAU = Math.PI * 2;
  var SWEEP_ANGLE = -0.42;      // 掠光/拉丝行进方向,约 -24°,斜向
  var BREATH_PERIOD = 60;       // 四角炭影基准呼吸周期(被档位 speed 缩放)
  var CORNER_PHASE = [0, 1.9, 3.7, 5.1];
  var STATIC_T = 8.5;           // 静帧取样时刻:适中档此刻掠光恰在画面中段

  /* —— 三档强度预设 ——
     subtle = 首版原参数,原样保留;medium ≈ 2.5x;rich ≈ 5x+。
     缩放的不只是透明度:结构密度(尘/丝数量)、对比(炭影/暗角/板斑)、
     动效速度(speed)、事件频率(掠光 period)全部随档位走。 */
  var PRESETS = {
    subtle: {
      speed: 1,
      sweep:  { period: 30, dur: 11, offset: 26, band: 0.032, lit: 0.8, halfFrac: 0.26 },
      streak: { div: 2100, min: 420, max: 1600,
                light: [0.045, 0.11], dark: [0.035, 0.07],
                width: [0.5, 1.3], len: [60, 480], resident: 0.16 },
      sheen: 0,                                  /* 无常驻光泽带 */
      breath: { base: 0.17, amp: 0.10, speed: 1 },
      noise: { peak: 13, alpha: 0.9 },
      spotMul: 1,
      swell: 0,                                  /* 无明暗涌动 */
      dust: {
        div: 42000, min: 20, max: 40,
        layers: [
          { frac: 5 / 6, sprite: 'sharp', size: [1.7, 3.4], alpha: [0.055, 0.095], drift: 1, rise: [0.05, 0.13] },
          { frac: 1 / 6, sprite: 'soft',  size: [4.2, 6.8], alpha: [0.030, 0.050], drift: 1, rise: [0.05, 0.13] }
        ]
      }
    },
    medium: {
      speed: 1.35,
      sweep:  { period: 22, dur: 9, offset: 18, band: 0.07, lit: 0.95, halfFrac: 0.24 },
      streak: { div: 1400, min: 700, max: 2600,
                light: [0.07, 0.15], dark: [0.04, 0.08],
                width: [0.5, 1.5], len: [50, 400], resident: 0.45 },
      sheen: 0.045,
      breath: { base: 0.20, amp: 0.13, speed: 1.3 },
      noise: { peak: 15, alpha: 1 },
      spotMul: 1.7,
      swell: 0.025,
      dust: {
        div: 19000, min: 45, max: 85,
        layers: [
          { frac: 0.24, sprite: 'soft',  size: [3.6, 6.4], alpha: [0.050, 0.080], drift: 0.8, rise: [0.05, 0.12] },
          { frac: 0.48, sprite: 'sharp', size: [1.8, 3.4], alpha: [0.090, 0.150], drift: 1.1, rise: [0.07, 0.16] },
          { frac: 0.28, sprite: 'near',  size: [3.2, 5.6], alpha: [0.120, 0.190], drift: 1.5, rise: [0.09, 0.20] }
        ]
      }
    },
    rich: {
      speed: 1.8,
      sweep:  { period: 15, dur: 7.5, offset: 7, band: 0.13, lit: 1.0, halfFrac: 0.20 },
      streak: { div: 850, min: 1100, max: 4000,
                light: [0.09, 0.19], dark: [0.05, 0.10],
                width: [0.6, 1.7], len: [40, 300], resident: 0.9 },
      sheen: 0.115,
      breath: { base: 0.24, amp: 0.15, speed: 1.7 },
      noise: { peak: 18, alpha: 1 },
      spotMul: 2.6,
      swell: 0.06,
      dust: {
        div: 9000, min: 80, max: 120,
        layers: [
          /* 远:小而虚;中:利落主体;近:更大更亮,边缘带景深晕 */
          { frac: 0.24, sprite: 'soft',  size: [3.4, 6.0], alpha: [0.080, 0.120], drift: 0.85, rise: [0.05, 0.12] },
          { frac: 0.44, sprite: 'sharp', size: [2.4, 4.4], alpha: [0.160, 0.250], drift: 1.2,  rise: [0.08, 0.18] },
          { frac: 0.32, sprite: 'near',  size: [5.6, 10.5], alpha: [0.260, 0.400], drift: 1.8,  rise: [0.11, 0.24] }
        ]
      }
    }
  };

  var currentKey = 'rich';   /* 默认载入即「浓郁」 */
  var activeKey = null;      /* 当前已构建图层对应的档位 */
  var P = PRESETS[currentKey];

  var W = 0, H = 0, dpr = 1, diag = 0, bandHalf = 0, cornerSize = 0;
  var base = null, streak = null, noiseLayer = null, sweepTemp = null;
  var sweepCtx = null, bandGrad = null;
  var cornerSprite = null, swellBright = null, swellDark = null;
  var sprites = {};
  var particles = [];

  var clock = 0, lastNow = 0, rafId = 0, running = false;
  var reduceQuery = window.matchMedia('(prefers-reduced-motion: reduce)');

  function rand(a, b) { return a + Math.random() * (b - a); }

  /* —— 微粒精灵:一次绘制,逐帧只 drawImage,避免每帧建渐变 —— */
  function makeDustSprite(size, hardness) {
    var c = document.createElement('canvas');
    c.width = c.height = size;
    var g = c.getContext('2d');
    var r = size / 2;
    var grad = g.createRadialGradient(r, r, 0, r, r, r);
    grad.addColorStop(0, 'rgba(231,236,240,1)');
    grad.addColorStop(hardness, 'rgba(231,236,240,0.5)');
    grad.addColorStop(1, 'rgba(231,236,240,0)');
    g.fillStyle = grad;
    g.fillRect(0, 0, size, size);
    return c;
  }

  /* 近景尘:实心主体 + 失焦光晕边,做轻微景深感 */
  function makeNearSprite(size) {
    var c = document.createElement('canvas');
    c.width = c.height = size;
    var g = c.getContext('2d');
    var r = size / 2;
    var grad = g.createRadialGradient(r, r, 0, r, r, r);
    grad.addColorStop(0, 'rgba(231,236,240,1)');
    grad.addColorStop(0.45, 'rgba(231,236,240,0.92)');
    grad.addColorStop(0.72, 'rgba(231,236,240,0.32)');
    grad.addColorStop(1, 'rgba(231,236,240,0)');
    g.fillStyle = grad;
    g.fillRect(0, 0, size, size);
    return c;
  }

  function makeCornerSprite() {
    var s = 384;
    var c = document.createElement('canvas');
    c.width = c.height = s;
    var g = c.getContext('2d');
    var grad = g.createRadialGradient(0, 0, 0, 0, 0, s);
    grad.addColorStop(0, 'rgba(10,12,15,0.85)');   /* ambient-c #0d1013 系 */
    grad.addColorStop(0.45, 'rgba(10,12,15,0.38)');
    grad.addColorStop(1, 'rgba(10,12,15,0)');
    g.fillStyle = grad;
    g.fillRect(0, 0, s, s);
    return c;
  }

  /* 大尺度明暗涌动用的软斑精灵(亮/暗各一) */
  function makeSwellSprite(dark) {
    var s = 256;
    var c = document.createElement('canvas');
    c.width = c.height = s;
    var g = c.getContext('2d');
    var grad = g.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
    if (dark) {
      grad.addColorStop(0, 'rgba(8,10,12,0.9)');
      grad.addColorStop(0.5, 'rgba(8,10,12,0.38)');
      grad.addColorStop(1, 'rgba(8,10,12,0)');
    } else {
      grad.addColorStop(0, 'rgba(231,236,240,0.9)');
      grad.addColorStop(0.5, 'rgba(231,236,240,0.38)');
      grad.addColorStop(1, 'rgba(231,236,240,0)');
    }
    g.fillStyle = grad;
    g.fillRect(0, 0, s, s);
    return c;
  }

  /* —— 拉丝纹理:沿掠光长轴的细丝,凑近看的细节来源;密度/明度随档位 —— */
  function buildStreak() {
    var S = P.streak;
    streak = document.createElement('canvas');
    streak.width = Math.round(W * dpr);
    streak.height = Math.round(H * dpr);
    var g = streak.getContext('2d');
    g.setTransform(dpr, 0, 0, dpr, 0, 0);
    g.translate(W / 2, H / 2);
    g.rotate(SWEEP_ANGLE);
    g.lineCap = 'round';
    var n = Math.max(S.min, Math.min(S.max, Math.round((W * H) / S.div)));
    for (var i = 0; i < n; i++) {
      var x = (Math.random() * 2 - 1) * diag * 0.75;
      var y0 = (Math.random() * 2 - 1) * diag * 0.75;
      var len = rand(S.len[0], S.len[1]);
      var slope = (Math.random() * 2 - 1) * 0.035;
      var dark = Math.random() < 0.28;
      g.strokeStyle = dark
        ? 'rgba(0,0,0,' + rand(S.dark[0], S.dark[1]).toFixed(3) + ')'
        : 'rgba(231,236,240,' + rand(S.light[0], S.light[1]).toFixed(3) + ')';
      g.lineWidth = S.width[0] + Math.random() * (S.width[1] - S.width[0]);
      g.beginPath();
      g.moveTo(x, y0);
      g.lineTo(x + slope * len, y0 + len);
      g.stroke();
    }
  }

  /* —— 细颗粒噪点:抖掉暗部渐变的色带,也是「炭粉」质感 —— */
  function buildNoise() {
    noiseLayer = document.createElement('canvas');
    noiseLayer.width = Math.round(W * dpr);
    noiseLayer.height = Math.round(H * dpr);
    var g = noiseLayer.getContext('2d');
    var img = g.createImageData(noiseLayer.width, noiseLayer.height);
    var d = img.data;
    var peak = P.noise.peak;
    for (var i = 0; i < d.length; i += 4) {
      var v = Math.random() < 0.5 ? 0 : 255;
      d[i] = v; d[i + 1] = v; d[i + 2] = v;
      d[i + 3] = (Math.random() * peak) | 0;
    }
    g.putImageData(img, 0, 0);
  }

  /* 常驻斜向光泽带:沿拉丝方向的明暗条带,强档下静帧也能读出「拉丝金属」 */
  function sheenBand(g, cx, half, peak, dark) {
    var col = dark ? '8,10,12' : '231,236,240';
    var grad = g.createLinearGradient(cx - half, 0, cx + half, 0);
    grad.addColorStop(0, 'rgba(' + col + ',0)');
    grad.addColorStop(0.5, 'rgba(' + col + ',' + peak.toFixed(3) + ')');
    grad.addColorStop(1, 'rgba(' + col + ',0)');
    g.fillStyle = grad;
    g.fillRect(cx - half, -diag, half * 2, diag * 2);
  }

  /* —— 静态底层:基色 + 大尺度灰度起伏 + 光泽带 + 暗角 + 常驻拉丝 + 噪点 —— */
  function buildBase() {
    base = document.createElement('canvas');
    base.width = Math.round(W * dpr);
    base.height = Math.round(H * dpr);
    var g = base.getContext('2d');
    g.setTransform(dpr, 0, 0, dpr, 0, 0);

    g.fillStyle = '#1a1d22'; /* --bg 原值 */
    g.fillRect(0, 0, W, H);

    function spot(cx, cy, r, color) {
      var grad = g.createRadialGradient(cx, cy, 0, cx, cy, r);
      grad.addColorStop(0, color);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      g.fillStyle = grad;
      g.fillRect(0, 0, W, H);
    }
    /* 石墨板材的不均匀:大软斑,明度差随档位放大 */
    var m = P.spotMul;
    var dm = 1 + (m - 1) * 0.6; /* 暗部斑/暗角用收敛一些的倍率,避免糊死 */
    spot(W * 0.32, H * 0.22, diag * 0.55, 'rgba(231,236,240,' + (0.020 * m).toFixed(3) + ')');
    spot(W * 0.66, H * 0.14, diag * 0.38, 'rgba(231,236,240,' + (0.012 * m).toFixed(3) + ')');
    spot(W * 0.76, H * 0.74, diag * 0.50, 'rgba(13,16,19,' + Math.min(0.45, 0.22 * dm).toFixed(3) + ')');

    /* 常驻斜向光泽带(仅中/浓档):石墨拉丝的各向异性高光 */
    if (P.sheen > 0) {
      g.save();
      g.translate(W / 2, H / 2);
      g.rotate(SWEEP_ANGLE);
      sheenBand(g, -diag * 0.16, diag * 0.14, P.sheen, false);        /* 主光泽带 */
      sheenBand(g, diag * 0.02, diag * 0.10, P.sheen * 0.85, true);   /* 中间暗带拉开层次 */
      sheenBand(g, diag * 0.22, diag * 0.11, P.sheen * 0.6, false);   /* 次光泽带 */
      sheenBand(g, -diag * 0.34, diag * 0.09, P.sheen * 0.7, true);   /* 外侧暗带,收住主带边缘 */
      g.restore();
    }

    /* 静态暗角(呼吸炭影叠在其上) */
    var vg = g.createRadialGradient(W * 0.5, H * 0.52, diag * 0.30, W * 0.5, H * 0.52, diag * 0.62);
    vg.addColorStop(0, 'rgba(8,10,12,0)');
    vg.addColorStop(1, 'rgba(8,10,12,' + Math.min(0.42, 0.32 * dm).toFixed(3) + ')');
    g.fillStyle = vg;
    g.fillRect(0, 0, W, H);

    /* 常驻拉丝纹理:含蓄档 ~1% 几乎不可见,浓郁档明显可读;掠光来时再被点亮 */
    g.globalAlpha = P.streak.resident;
    g.setTransform(1, 0, 0, 1, 0, 0);
    g.drawImage(streak, 0, 0);
    g.globalAlpha = P.noise.alpha;
    g.drawImage(noiseLayer, 0, 0);
    g.globalAlpha = 1;
  }

  function seedParticles() {
    var D = P.dust;
    var count = Math.max(D.min, Math.min(D.max, Math.round((W * H) / D.div)));
    particles.length = 0;
    var made = 0;
    for (var li = 0; li < D.layers.length; li++) {
      var L = D.layers[li];
      var n = (li === D.layers.length - 1)
        ? count - made
        : Math.round(count * L.frac);
      made += n;
      for (var i = 0; i < n; i++) {
        particles.push({
          bx: Math.random() * W,
          py: Math.random() * H,
          rise: rand(L.rise[0], L.rise[1]),
          a1: rand(1.2, 3.4) * L.drift, f1: rand(0.05, 0.14), p1: rand(0, TAU),
          a2: rand(0.5, 1.6) * L.drift, f2: rand(0.17, 0.34), p2: rand(0, TAU),
          ay: rand(0.6, 1.8) * L.drift, fy: rand(0.06, 0.16), py2: rand(0, TAU),
          size: rand(L.size[0], L.size[1]),
          alpha: rand(L.alpha[0], L.alpha[1]),
          tf: rand(0.45, 1.05), tp: rand(0, TAU),
          sprite: L.sprite
        });
      }
    }
  }

  function rebuild() {
    dpr = Math.min(window.devicePixelRatio || 1, DPR_CAP);
    W = window.innerWidth;
    H = window.innerHeight;
    diag = Math.sqrt(W * W + H * H);
    bandHalf = diag * P.sweep.halfFrac;
    cornerSize = Math.min(W, H) * 0.62;

    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);

    buildStreak();
    buildNoise();
    buildBase();

    sweepTemp = document.createElement('canvas');
    sweepTemp.width = canvas.width;
    sweepTemp.height = canvas.height;
    sweepCtx = sweepTemp.getContext('2d');

    bandGrad = ctx.createLinearGradient(-bandHalf, 0, bandHalf, 0);
    bandGrad.addColorStop(0, 'rgba(231,236,240,0)');
    bandGrad.addColorStop(0.2, 'rgba(231,236,240,0.16)');
    bandGrad.addColorStop(0.42, 'rgba(231,236,240,0.82)');
    bandGrad.addColorStop(0.5, 'rgba(231,236,240,1)');
    bandGrad.addColorStop(0.58, 'rgba(231,236,240,0.82)');
    bandGrad.addColorStop(0.8, 'rgba(231,236,240,0.16)');
    bandGrad.addColorStop(1, 'rgba(231,236,240,0)');

    seedParticles();
  }

  function drawSwell(sprite, x, y, r, alpha, mode) {
    if (alpha <= 0) return;
    ctx.save();
    ctx.globalCompositeOperation = mode;
    ctx.globalAlpha = Math.min(1, alpha);
    ctx.drawImage(sprite, x - r, y - r, r * 2, r * 2);
    ctx.restore();
  }

  function draw(t, dt) {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.drawImage(base, 0, 0, W, H);

    /* —— 大尺度明暗涌动(仅中/浓档):石墨表面光泽的极缓起伏 —— */
    if (P.swell > 0) {
      var st = t * P.speed;
      drawSwell(swellBright,
        W * (0.50 + 0.30 * Math.sin(st * 0.055 + 0.8)),
        H * (0.40 + 0.27 * Math.cos(st * 0.041)),
        diag * 0.42,
        P.swell * (0.62 + 0.38 * Math.sin(st * 0.067 + 1.4)), 'screen');
      drawSwell(swellBright,
        W * (0.44 + 0.36 * Math.cos(st * 0.037 + 2.2)),
        H * (0.62 + 0.30 * Math.sin(st * 0.049 + 4.1)),
        diag * 0.30,
        P.swell * 0.7 * (0.55 + 0.45 * Math.cos(st * 0.059 + 0.3)), 'screen');
      drawSwell(swellDark,
        W * (0.55 + 0.33 * Math.sin(st * 0.044 + 3.5)),
        H * (0.50 + 0.30 * Math.cos(st * 0.052 + 1.9)),
        diag * 0.46,
        P.swell * 1.25 * (0.6 + 0.4 * Math.sin(st * 0.048 + 2.7)), 'source-over');
    }

    /* —— 四角炭粉阴影呼吸(各角错相,幅度/速度随档位) —— */
    for (var i = 0; i < 4; i++) {
      var breath = P.breath.base
        + P.breath.amp * Math.sin(TAU * t * P.breath.speed / BREATH_PERIOD + CORNER_PHASE[i]);
      ctx.save();
      ctx.globalAlpha = breath;
      if (i === 0) ctx.translate(0, 0);
      else if (i === 1) { ctx.translate(W, 0); ctx.scale(-1, 1); }
      else if (i === 2) { ctx.translate(W, H); ctx.scale(-1, -1); }
      else { ctx.translate(0, H); ctx.scale(1, -1); }
      ctx.drawImage(cornerSprite, 0, 0, cornerSize, cornerSize);
      ctx.restore();
    }

    /* —— 斜向拉丝金属掠光:间隔/峰值随档位(浓郁 15s 一道,峰值 ~13%) —— */
    var tc = (t + P.sweep.offset) % P.sweep.period;
    if (tc < P.sweep.dur) {
      var p = tc / P.sweep.dur;
      var env = Math.sin(Math.PI * p);
      env = env * env;                                  /* 柔和入出 */
      var off = (p * 2 - 1) * (diag * 0.5 + bandHalf);  /* 从画外扫到画外 */

      /* 宽幅柔光带本体 */
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      ctx.globalAlpha = P.sweep.band * env;
      ctx.translate(W / 2, H / 2);
      ctx.rotate(SWEEP_ANGLE);
      ctx.translate(off, 0);
      ctx.fillStyle = bandGrad;
      ctx.fillRect(-bandHalf, -diag, bandHalf * 2, diag * 2);
      ctx.restore();

      /* 光带内点亮拉丝细纹:band 渐变作蒙版裁出 streak 纹理 */
      sweepCtx.setTransform(1, 0, 0, 1, 0, 0);
      sweepCtx.clearRect(0, 0, sweepTemp.width, sweepTemp.height);
      sweepCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      sweepCtx.translate(W / 2, H / 2);
      sweepCtx.rotate(SWEEP_ANGLE);
      sweepCtx.translate(off, 0);
      sweepCtx.fillStyle = bandGrad;
      sweepCtx.fillRect(-bandHalf, -diag, bandHalf * 2, diag * 2);
      sweepCtx.globalCompositeOperation = 'source-in';
      sweepCtx.setTransform(1, 0, 0, 1, 0, 0);
      sweepCtx.drawImage(streak, 0, 0);
      sweepCtx.globalCompositeOperation = 'source-over';

      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      ctx.globalAlpha = P.sweep.lit * env;
      ctx.drawImage(sweepTemp, 0, 0, W, H);
      ctx.restore();
    }

    /* —— 悬浮碳尘:近中远三层,布朗微动 + 缓慢上升(速度随档位) —— */
    var tm = t * P.speed;
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    for (var j = 0; j < particles.length; j++) {
      var d = particles[j];
      if (dt > 0) {
        d.py -= d.rise * P.speed * dt;
        if (d.py < -16) { d.py = H + 16; d.bx = Math.random() * W; }
      }
      var x = d.bx
        + Math.sin(tm * d.f1 + d.p1) * d.a1
        + Math.sin(tm * d.f2 + d.p2) * d.a2;
      var y = d.py + Math.sin(tm * d.fy + d.py2) * d.ay;
      if (x < -16) x += W + 32; else if (x > W + 16) x -= W + 32;
      var tw = 0.78 + 0.22 * Math.sin(tm * d.tf + d.tp);
      ctx.globalAlpha = d.alpha * tw;
      var s = d.size;
      ctx.drawImage(sprites[d.sprite], x - s / 2, y - s / 2, s, s);
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function frame(now) {
    rafId = requestAnimationFrame(frame);
    var dt = (now - lastNow) / 1000;
    lastNow = now;
    if (dt < 0) dt = 0;
    if (dt > 0.1) dt = 0.1; /* 切回标签页等场景不跳变 */
    clock += dt;
    draw(clock, dt);
  }

  function start() {
    if (running) return;
    running = true;
    lastNow = performance.now();
    rafId = requestAnimationFrame(frame);
  }

  function stop() {
    if (!running) return;
    running = false;
    cancelAnimationFrame(rafId);
  }

  /* 减少动态:单帧静态画面(取掠光行至画面中段的相位,保证可见但不动) */
  function renderStatic() {
    draw(STATIC_T, 0);
  }

  /* —— 档位切换 ——
     prefers-reduced-motion 下强制以「适中」档渲染静帧:可见但不动。 */
  function effectiveKey() {
    return reduceQuery.matches ? 'medium' : currentKey;
  }

  function syncPreset() {
    var want = effectiveKey();
    if (want !== activeKey) {
      activeKey = want;
      P = PRESETS[want];
      rebuild();
    }
  }

  var ctl = document.getElementById('intensityCtl');
  var lvlButtons = ctl.querySelectorAll('button[data-level]');

  function updateControl() {
    for (var i = 0; i < lvlButtons.length; i++) {
      var pressed = lvlButtons[i].getAttribute('data-level') === currentKey;
      lvlButtons[i].setAttribute('aria-pressed', pressed ? 'true' : 'false');
    }
  }

  function setIntensity(key) {
    if (!PRESETS[key] || key === currentKey) return;
    currentKey = key;
    document.body.setAttribute('data-intensity', key);
    updateControl();
    syncPreset();
    if (reduceQuery.matches || document.hidden) renderStatic();
  }

  ctl.addEventListener('click', function (e) {
    var b = e.target && e.target.closest ? e.target.closest('button[data-level]') : null;
    if (b) setIntensity(b.getAttribute('data-level'));
  });

  window.addEventListener('keydown', function (e) {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (e.key === '1') setIntensity('subtle');
    else if (e.key === '2') setIntensity('medium');
    else if (e.key === '3') setIntensity('rich');
  });

  function applyMotionPreference() {
    syncPreset();
    if (reduceQuery.matches) {
      stop();
      renderStatic();
    } else {
      start();
    }
  }

  document.addEventListener('visibilitychange', function () {
    if (document.hidden) {
      stop();
    } else if (!reduceQuery.matches) {
      start();
    }
  });

  window.addEventListener('resize', function () {
    rebuild();
    if (reduceQuery.matches || document.hidden) renderStatic();
  });

  if (typeof reduceQuery.addEventListener === 'function') {
    reduceQuery.addEventListener('change', applyMotionPreference);
  }

  cornerSprite = makeCornerSprite();
  swellBright = makeSwellSprite(false);
  swellDark = makeSwellSprite(true);
  sprites.sharp = makeDustSprite(32, 0.22);
  sprites.soft = makeDustSprite(32, 0.5);
  sprites.near = makeNearSprite(48);
  updateControl();
  syncPreset();    /* 默认浓郁档构建图层 */
  renderStatic();  /* 先铺一帧,避免首帧闪空 */
  if (!document.hidden) applyMotionPreference();
})();
</script>
</body>
</html>
