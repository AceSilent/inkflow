appId: com.inkflow.studio
productName: InkFlow
copyright: Copyright (c) 2026 InkFlow
asar: true
directories:
  output: dist-electron
files:
  - package.json
  - electron/**/*
  - frontend/dist/**/*
extraResources:
  - from: desktop/binaries/inkflow-server-aarch64-apple-darwin
    to: binaries/inkflow-server-aarch64-apple-darwin
mac:
  category: public.app-category.productivity
  icon: desktop/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
    - target: dir
      arch:
        - arm64
dmg:
  artifactName: InkFlow_${version}_${arch}.${ext}
